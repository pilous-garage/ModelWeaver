name: curl
description: "curl - auto-generated recipe"
class: other
timeout: 120

pre_install:
  - command: echo "Installing curl..."

post_install:
  - command: curl --version

post_uninstall:
  - "rm -rf {home}/.curl"

versions:
  default: "1.0.0"
  "1.0.0":
    linux:
      apt:
        package: "curl"
        install:
          - "apt-get install -y curl"
        uninstall:
          - "apt-get remove -y curl"
          - "apt-get autoremove -y"
