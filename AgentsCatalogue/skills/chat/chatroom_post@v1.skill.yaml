name: chat/chatroom_post@v1
category: chat
description: Poste un message dans un chatroom N:N (comms/{chatroom_id}). Un chatroom
  regroupe des agents qui collaborent, indépendamment des projets.
inputs:
  chatroom_id:
    type: string
    required: true
    description: Identifiant du salon (groupe d'agents)
  agent_id:
    type: string
    required: false
    default: ''
    description: Agent auteur (injecté automatiquement)
  content:
    type: string
    required: true
    description: Message à publier
outputs:
  ok:
    type: boolean
implementation:
  type: python
  function: system.agent.chatroom_post
