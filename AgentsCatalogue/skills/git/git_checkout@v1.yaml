name: git/git_checkout@v1
category: git
description: Change de branche dans le dépôt git du projet.
inputs:
  project_id:
    type: string
    required: true
    description: Identifiant du projet
  agent_id:
    type: string
    required: false
    description: Identifiant de l'agent (injecté automatiquement par le FSM si absent)
  name:
    type: string
    required: true
    description: Nom de branche cible
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: True ssi la commande git a réussi (exit_code == 0)
implementation:
  type: python
  function: system.git.git_checkout
