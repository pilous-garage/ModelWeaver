name: git/git_status@v1
category: git
description: Affiche le statut git (--porcelain) du projet.
inputs:
  project_id:
    type: string
    required: true
    description: Identifiant du projet
  agent_id:
    type: string
    required: false
    description: Identifiant de l'agent (injecté automatiquement par le FSM si absent)
outputs:
  stdout:
    type: string
  clean:
    type: boolean
    description: True ssi l'arbre de travail est propre (aucun changement)
  conflicts:
    type: array
    items:
      type: string
    description: Liste des fichiers en conflit de merge (non résolus)
  exit_code:
    type: integer
  ok:
    type: boolean
    description: True ssi la commande git a réussi (exit_code == 0)
implementation:
  type: python
  function: system.git.git_status
