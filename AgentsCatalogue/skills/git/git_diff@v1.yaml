name: git/git_diff@v1
category: git
description: Affiche un diff git (working tree ou entre branches) dans le projet.
inputs:
  project_id:
    type: string
    required: true
    description: Identifiant du projet
  agent_id:
    type: string
    required: false
    description: Identifiant de l'agent (injecté automatiquement par le FSM si absent)
  target:
    type: string
    required: false
    default: ''
    description: Cible du diff (branche, commit) ; vide = working tree
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: True ssi la commande git a réussi (exit_code == 0)
implementation:
  type: python
  function: system.git.git_diff
