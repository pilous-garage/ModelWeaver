name: git/git_branch@v1
category: git
description: Liste les branches, ou crée une branche (create=true) dans le projet.
inputs:
  project_id:
    type: string
    required: true
    description: Identifiant du projet
  agent_id:
    type: string
    required: false
    description: Identifiant de l'agent (injecté automatiquement par le FSM si absent)
  name:
    type: string
    required: false
    default: ''
    description: Nom de branche (si create=true)
  create:
    type: boolean
    required: false
    default: false
    description: Crée la branche (git checkout -b)
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: True ssi la commande git a réussi (exit_code == 0)
implementation:
  type: python
  function: system.git.git_branch
