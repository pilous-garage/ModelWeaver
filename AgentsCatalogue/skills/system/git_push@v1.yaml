name: system/git_push@v1
category: system
description: "Publie les commits. En local (même dépôt) les commits sont déjà partagés ; push un remote si configuré."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet"
  agent_id:
    type: string
    required: false
    description: "Identifiant de l'agent (injecté automatiquement par le FSM si absent)"
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: "True ssi la commande git a réussi (exit_code == 0)"
implementation:
  type: python
  function: _exec_git_push
