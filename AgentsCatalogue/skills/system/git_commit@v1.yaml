name: system/git_commit@v1
category: system
description: "Stage tous les fichiers et crée un commit dans le dépôt git du projet."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet"
  message:
    type: string
    required: false
    default: update
    description: "Message de commit"
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
implementation:
  type: python
  function: _exec_git_commit
