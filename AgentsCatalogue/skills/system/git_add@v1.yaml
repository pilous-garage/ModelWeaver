name: system/git_add@v1
category: system
description: "Stage un fichier (ou tous les fichiers) dans l'index git — utile pour conclure un merge après résolution de conflit."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet"
  agent_id:
    type: string
    required: false
    description: "Identifiant de l'agent (injecté automatiquement par le FSM si absent)"
  path:
    type: string
    required: false
    description: "Fichier à stage (relatif au clone). Si absent, stage tout (git add -A)"
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: "True ssi la commande git a réussi (exit_code == 0)"
implementation:
  type: python
  function: _exec_git_add
