name: system/repo_init@v1
category: system
description: "Crée le dépôt central BARE d'un projet (repos/{id}.git) et y sème un commit initial (master : README + .gitignore). Source de vérité partagée."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet (dépôt central partagé)"
outputs:
  ok:
    type: boolean
  path:
    type: string
implementation:
  type: python
  function: _exec_repo_init
