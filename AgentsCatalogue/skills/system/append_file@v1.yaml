name: system/append_file@v1
category: system
description: "Ajoute du contenu à la fin d'un fichier de l'espace personnel."
inputs:
  path:
    type: string
    required: true
    description: "Fichier relatif au home (sans sous-dossier -> work/)"
  content:
    type: string
    required: true
    description: "Contenu à ajouter"
outputs:
  ok:
    type: boolean
    description: "True si ajouté"
implementation:
  type: python
  function: system.file.append_file