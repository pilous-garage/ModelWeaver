name: system/hash@v1
category: system
description: "Calcule le hash d'une chaîne (sha256, sha1, md5, ...)."
inputs:
  data:
    type: string
    required: true
    description: "Donnée à hacher"
  algo:
    type: string
    required: false
    default: sha256
    description: "Algorithme (sha256, md5, ...)"
outputs:
  algo:
    type: string
  hex:
    type: string
    description: "Hash hexadécimal"
implementation:
  type: python
  function: _exec_hash
