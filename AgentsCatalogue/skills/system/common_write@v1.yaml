name: system/common_write@v1
category: system
description: "Écrit un fichier dans l'espace commun live d'un groupe (common/{group_id}), non versionné (dernier écrivain gagne)."
inputs:
  group_id:
    type: string
    required: true
    description: "Identifiant du groupe/espace commun"
  path:
