name: system/get_budget@v1
category: system
description: "Lit le budget de tokens restant pour un provider/model (via TarifManager)."
inputs:
  provider_ref:
    type: string
    required: false
    default: ""
  model_ref:
    type: string
    required: false
    default: ""
outputs:
  budget:
    type: object
    description: "Infos budget (tokens/min, tokens/day, ...)"
implementation:
  type: python
  function: system.agent.get_budget