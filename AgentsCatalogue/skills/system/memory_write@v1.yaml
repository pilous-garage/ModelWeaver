name: system/memory_write@v1
category: system
description: "Persiste une valeur JSON dans la mémoire long-terme de l'agent (dossier mem/)."
inputs:
  agent_id:
    type: string
    required: true
    description: "Identifiant de l'agent (cible du stockage mem/)"
  namespace:
    type: string
    required: false
    default: default
    description: "Espace de noms logique (ex: notes, facts, prefs)"
  key:
    type: string
    required: true
    description: "Clé de la mémoire"
  value:
    type: object
    required: true
    description: "Valeur à persister (JSON-sérialisable)"
outputs:
  ok:
    type: boolean
    description: "True si l'écriture a réussi"
  path:
    type: string
    description: "Chemin du fichier écrit"
implementation:
  type: python
  function: system.memory.memory_write