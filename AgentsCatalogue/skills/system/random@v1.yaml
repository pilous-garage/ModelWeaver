    type: integer
    required: false
    default: 0
    description: "Borne basse"
  max:
    type: integer
    required: false
    default: 100
    description: "Borne haute"
outputs:
  value:
    type: integer
    description: "Entier aléatoire"
implementation:
  type: python
  function: system.text.random