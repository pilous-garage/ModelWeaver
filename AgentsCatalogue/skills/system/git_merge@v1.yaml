name: system/git_merge@v1
category: system
description: "Fusionne une branche dans la branche courante (intégration manager)."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet"
  agent_id:
    type: string
    required: false
    description: "Identifiant de l'agent (injecté automatiquement par le FSM si absent)"
  name:
    type: string
    required: true
    description: "Branche à fusionner"
  strategy:
    type: string
    required: false
    enum: [ours, theirs]
    description: "Résolution automatique des conflits en faveur d'un côté (git merge -X)"
  abort:
    type: boolean
    required: false
    description: "Si true, annule un merge en cours (git merge --abort)"
outputs:
  stdout:
    type: string
  stderr:
    type: string
  exit_code:
    type: integer
  ok:
    type: boolean
    description: "True ssi la commande git a réussi (exit_code == 0)"
  conflict:
    type: boolean
    description: "True si le merge a échoué sur un conflit de contenu"
  conflicts:
    type: array
    items:
      type: string
    description: "Fichiers en conflit (non résolus) après un merge échoué"
  error:
    type: string
    description: "Message d'erreur explicite (ex. 'merge en échec (conflit de contenu)')"
implementation:
  type: python
  function: _exec_git_merge
