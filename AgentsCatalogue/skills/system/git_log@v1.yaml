name: system/git_log@v1
category: system
description: "Affiche l'historique des commits du projet (--oneline)."
inputs:
  project_id:
    type: string
    required: true
    description: "Identifiant du projet"
  agent_id:
    type: string
    required: false
    description: "Identifiant de l'agent (injecté automatiquement par le FSM si absent)"
  oneline:
    type: boolean
    required: false
    default: true
    description: "Format --oneline"
outputs:
  stdout:
    type: string
  lines:
    type: array
  exit_code:
    type: integer
  ok:
    type: boolean
    description: "True ssi la commande git a réussi (exit_code == 0)"
implementation:
  type: python
  function: system.git.git_log