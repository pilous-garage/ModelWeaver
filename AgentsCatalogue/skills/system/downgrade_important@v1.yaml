name: system/downgrade_important@v1
category: system
description: "Rétrograde un fichier du dossier important/ vers work/ (retiré de l'index)."
inputs:
  src:
    type: string
    required: true
    description: "Fichier source dans important/ (relatif au home)"
  name:
    type: string
    required: false
    default: ""
    description: "Nom cible dans work/ (sinon basename de src)"
outputs:
  ok:
    type: boolean
  path:
    type: string
    description: "Chemin relatif résultant (work/...)"
implementation:
  type: python
  function: _exec_downgrade_important
