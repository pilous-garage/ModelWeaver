name: system/file_info@v1
category: system
description: "Renvoie les métadonnées d'un fichier/dossier de l'espace personnel."
inputs:
  path:
    type: string
    required: true
    description: "Chemin relatif au home (alias d'index accepté)"
outputs:
  exists:
    type: boolean
  is_dir:
    type: boolean
  size:
    type: integer
  mtime:
    type: number
implementation:
  type: python
  function: system.file.file_info