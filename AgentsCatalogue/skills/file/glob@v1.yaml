name: file/glob@v1
category: file
description: 'Recherche de fichiers par pattern glob dans l''espace personnel (ex:
  ''*.py'', ''**/*.md'').'
inputs:
  pattern:
    type: string
    required: false
    default: '*'
    description: Pattern glob relatif au home
outputs:
  matches:
    type: array
    description: Chemins relatifs trouvés
implementation:
  type: python
  function: system.file.glob
