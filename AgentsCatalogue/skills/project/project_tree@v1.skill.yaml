name: project/project_tree@v1
category: project
description: Renvoie l'arbre des fichiers de l'espace projet partagé.
inputs:
  project_id:
    type: string
    required: true
    description: Identifiant du projet
  agent_id:
    type: string
    required: false
    description: Identifiant de l'agent (injecté automatiquement par le FSM si absent)
outputs:
  files:
    type: array
    description: Chemins relatifs de tous les fichiers
implementation:
  type: python
  function: system.project.project_tree
