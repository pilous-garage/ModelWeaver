# Worker CLI — implémente cli.py (affichage + saisie + boucle de jeu)
# LLM : groq/llama-3.1-8b-instant (différent du worker moteur).
chatroom_id: chess
steps:
  - id: start
    type: switch
    variable: request
    conditions:
      - {operator: EQUALS, value: brainstorm, next: b1}
      - {operator: EQUALS, value: implement, next: i1}
    default: b1

  # ── brainstorm ──
  - id: b1
    type: call
    fn: system/git_clone@v1
    inputs: {project_id: chess}
    next: b2
  - id: b2
    type: call
    fn: system/chatroom_read@v1
    inputs: {chatroom_id: chess, last_n: 100}
    capture: {messages: _ctx}
    next: b3
  - id: b3
    type: llm_call
    provider_ref: groq
    model_ref: llama-3.1-8b-instant
    skill_prompt: "Contexte chatroom : {{_ctx}}\n\nTu es le worker CLI. Propose la conception de cli.py : affichage ASCII du plateau, saisie des coups (ex. 'e2e4'), boucle de jeu. Signatures de fonctions. Texte concis, sans fences."
    output_capture: _idea
    max_tokens: 300
    timeout: 60
    fallback: true
    next: b4
  - id: b4
    type: call
    fn: system/chatroom_post@v1
    inputs:
      chatroom_id: chess
      content: "[worker-cli] Idee : {{_idea}}"
    next: b5
  - id: b5
    type: call
    fn: system/git_status@v1
    inputs: {project_id: chess}
    next: end
    capture: {clean: _clean}

  # ── implement ──
  - id: i1
    type: call
    fn: system/git_clone@v1
    inputs: {project_id: chess}
    next: i2
  - id: i2
    type: call
    fn: system/git_branch@v1
    inputs: {project_id: chess, name: feature-cli, create: true}
    next: i3
  - id: i3
    type: call
    fn: system/chatroom_read@v1
    inputs: {chatroom_id: chess, last_n: 100}
    capture: {messages: _ctx}
    next: i4
  - id: i4
    type: llm_call
    provider_ref: groq
    model_ref: llama-3.1-8b-instant
    skill_prompt: "Contexte chatroom : {{_ctx}}\n\nImplemente src/cli.py pour un jeu d'echecs : affiche le plateau en ASCII, lit une saisie 'e2e4', appelle engine pour valider, boucle de jeu. Respecte les interfaces decidees. Output ONLY raw Python, no markdown fences, no commentary."
    output_capture: _code
    max_tokens: 700
    timeout: 60
    fallback: true
    strip_fences: true
    next: i5
  - id: i5
    type: call
    fn: system/project_write@v1
    inputs:
      project_id: chess
      path: src/cli.py
      content: "{{_code}}"
    next: i6
  - id: i6
    type: call
    fn: system/git_commit@v1
    inputs: {project_id: chess, message: "add src/cli.py (LLM groq)"}
    next: i7
  - id: i7
    type: call
    fn: system/git_push@v1
    inputs: {project_id: chess, branch: feature-cli}
    next: end

  - id: end
    type: end
    status: SUCCESS
